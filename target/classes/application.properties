# ── Serveur ──────────────────────────────────────────────────
server.port=8080

# ── Application ───────────────────────────────────────────────
spring.application.name=boutique

# ── Actuator — exposition des endpoints ───────────────────────
# Expose tous les endpoints HTTP (health, info, prometheus, metrics...)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ── Prometheus ────────────────────────────────────────────────
# Prometheus scrape sur : GET /actuator/prometheus
management.prometheus.metrics.export.enabled=true

# ── Info (visible sur /actuator/info) ─────────────────────────
info.app.name=Boutique ESIEE
info.app.version=1.0.0
info.app.description=Application de démonstration DevOps
